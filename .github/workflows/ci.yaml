name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm format:check

      - name: Type Check
        run: pnpm type-check

      - name: Lint Check
        run: pnpm lint:check

      - name: Run Tests
        run: pnpm test:dev

      - name: Shutdown services
        if: always()
        run: pnpm services:stop && pnpm services:down
