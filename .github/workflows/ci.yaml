name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: pnpm installation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
  lint:
    needs: install
    name: linting check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - run: pnpm lint:check
  test:
    needs: install
    name: testing (Jest)
    runs-on: ubuntu-latest
    steps:
      - run: pnpm test:dev
